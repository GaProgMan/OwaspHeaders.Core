name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'example/**'
      - '.github/workflows/release.yml'
      - 'README-NuGet.md'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --configuration Release --no-restore
  
  test:
    needs: [build]
    runs-on: ubuntu-latest
    name: Run all tests

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
      
    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Run all tests
      run: dotnet test OwaspHeaders.Core.sln --verbosity minimal --filter "Category!=Performance"


  package:
    needs: [build, test]
    runs-on: ubuntu-latest
    name: Create and upload NuGet package
    environment: production
    permissions:
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
      
    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Build NuGet package
      run: dotnet pack src/OwaspHeaders.Core.csproj --configuration Release

    - name: Generate Attestations
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: ${{ github.workspace }}/**/*.nupkg

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push NuGet package
      # use of --skip-duplicate here will stop NuGet from complaining
      # if we try to publish the same version multiple times by making
      # publish actions idempotent.
      run: dotnet nuget push **/*.nupkg --source 'https://api.nuget.org/v3/index.json' --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate